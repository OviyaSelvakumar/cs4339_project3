name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and lint
        run: |
          npm install
          npm run lint

      - name: Start backend server
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          NODE_ENV: test
          PORT: 3001
        run: |
          node webServer.js &
          echo "Waiting for server on port 3001..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:3001/admin/me > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: Server did not start within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      # Seed Atlas with clean data before every test run.
      # Without this, leftover users from previous runs cause the
      # user-count assertion to fail (e.g. 8 users found, 6 expected).
      - name: Seed database
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: node loadDatabase.js

      - name: Install test dependencies
        working-directory: test
        run: npm install

      - name: Run tests
        working-directory: test
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: npm test